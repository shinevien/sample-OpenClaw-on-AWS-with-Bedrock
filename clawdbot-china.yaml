AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClaw - AWS China Deployment (SiliconFlow / OpenAI-Compatible LLM Providers)'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E6101
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "LLM Provider Configuration"
        Parameters:
          - LLMApiBaseUrl
          - LLMModel
          - LLMApiKey
      - Label:
          default: "Compute Configuration"
        Parameters:
          - InstanceType
          - VolumeSize
          - VolumeType
          - KeyPairName
      - Label:
          default: "Network Configuration"
        Parameters:
          - UseExistingVPC
          - ExistingVPCId
          - ExistingPublicSubnetId
          - ExistingPrivateSubnetId
          - VpcCidr
          - CreateVPCEndpoints
          - AllowedSSHCIDR
      - Label:
          default: "S3 Files Skill Configuration"
        Parameters:
          - CreateS3Bucket
          - InstallS3FilesSkill
    ParameterLabels:
      LLMApiBaseUrl:
        default: "LLM API Base URL"
      LLMModel:
        default: "LLM Model ID"
      LLMApiKey:
        default: "LLM API Key"
      InstanceType:
        default: "EC2 Instance Type"
      VolumeSize:
        default: "Root EBS Volume Size (GB)"
      VolumeType:
        default: "Root EBS Volume Type"
      KeyPairName:
        default: "EC2 Key Pair Name"
      UseExistingVPC:
        default: "Use Existing VPC?"
      ExistingVPCId:
        default: "Existing VPC ID"
      ExistingPublicSubnetId:
        default: "Existing Public Subnet ID"
      ExistingPrivateSubnetId:
        default: "Existing Private Subnet ID"
      VpcCidr:
        default: "New VPC CIDR Block"
      CreateVPCEndpoints:
        default: "Create VPC Endpoints for SSM?"
      AllowedSSHCIDR:
        default: "Allowed SSH CIDR"
      CreateS3Bucket:
        default: "Create S3 Bucket?"
      InstallS3FilesSkill:
        default: "Install S3 Files Skill?"

Parameters:
  LLMApiBaseUrl:
    Type: String
    Default: "https://api.siliconflow.cn/v1"
    Description: "Base URL for OpenAI-compatible LLM API. SiliconFlow is the default; change to any OpenAI-compatible endpoint available in AWS China Marketplace."

  LLMModel:
    Type: String
    Default: "Pro/deepseek-ai/DeepSeek-V3"
    Description: "SiliconFlow model ID. Pro/ models recommended for Marketplace subscribers (better performance and rate limits). Full model list: https://docs.siliconflow.cn/cn/userguide/models"
    AllowedValues:
      # DeepSeek Pro (recommended for Marketplace subscribers)
      - "Pro/deepseek-ai/DeepSeek-V3"
      - "Pro/deepseek-ai/DeepSeek-R1"
      - "Pro/deepseek-ai/DeepSeek-V3.2"
      - "Pro/deepseek-ai/DeepSeek-V3.1-Terminus"
      # DeepSeek standard (free tier, lower rate limits)
      - "deepseek-ai/DeepSeek-V3"
      - "deepseek-ai/DeepSeek-R1"
      - "deepseek-ai/DeepSeek-V3.2"
      # Qwen (Alibaba)
      - "Qwen/Qwen3-32B"
      - "Qwen/Qwen3-14B"
      - "Qwen/Qwen3-8B"
      - "Qwen/Qwen2.5-72B-Instruct"
      # GLM (Zhipu AI)
      - "Pro/zai-org/GLM-4.7"
      - "zai-org/GLM-4.6"
      # Tencent
      - "tencent/Hunyuan-A13B-Instruct"
      # Cost-effective distilled models
      - "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
      - "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B"

  LLMApiKey:
    Type: String
    NoEcho: true
    Description: "API key for LLM provider (e.g., SiliconFlow API key starting with sk-). Stored securely in SSM Parameter Store."
    MinLength: 1

  InstanceType:
    Type: String
    Default: "c6g.large"
    Description: "Graviton (ARM) recommended for 20-40% better price-performance. x86 also supported."
    AllowedValues:
      - "t4g.small"
      - "t4g.medium"
      - "t4g.large"
      - "c6g.large"
      - "c6g.xlarge"
      - "c7g.large"
      - "c7g.xlarge"
      - "t3.small"
      - "t3.medium"
      - "t3.large"
      - "c5.large"
      - "c5.xlarge"

  VolumeSize:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 500
    Description: "Root EBS volume size in GB (20-500)"

  VolumeType:
    Type: String
    Default: "gp3"
    AllowedValues:
      - "gp3"
      - "gp2"
      - "io1"
      - "io2"
    Description: "Root EBS volume type"

  KeyPairName:
    Type: String
    Default: "none"
    Description: "EC2 key pair for emergency SSH access (optional - set to 'none' to skip)"

  UseExistingVPC:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Set to 'true' to use an existing VPC instead of creating a new one"

  ExistingVPCId:
    Type: AWS::EC2::VPC::Id
    Description: "Select an existing VPC (ignored when creating new VPC). Must have DNS hostnames and DNS resolution enabled."

  ExistingPublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: "Select an existing public subnet for EC2 (ignored when creating new VPC). Must have auto-assign public IP enabled."

  ExistingPrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: "Select an existing private subnet for VPC endpoints (ignored when creating new VPC)"

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: "CIDR block for new VPC (only used when UseExistingVPC=false)"

  AllowedSSHCIDR:
    Type: String
    Default: ""
    Description: "CIDR for SSH access (optional - leave empty for no inbound rules. SSM Session Manager is used for access.)"

  CreateVPCEndpoints:
    Type: String
    Default: "true"
    Description: "Create VPC endpoints for private network access to SSM (recommended for Session Manager)"
    AllowedValues:
      - "true"
      - "false"

  CreateS3Bucket:
    Type: String
    Default: "true"
    Description: "Create S3 bucket for S3 Files Skill with pre-configured security settings"
    AllowedValues:
      - "true"
      - "false"

  InstallS3FilesSkill:
    Type: String
    Default: "true"
    Description: "Install S3 Files Skill during deployment. If CreateS3Bucket=false, you must manually configure bucket name after deployment."
    AllowedValues:
      - "true"
      - "false"

Conditions:
  CreateNewVPC: !Equals [!Ref UseExistingVPC, "false"]
  CreateEndpoints: !Equals [!Ref CreateVPCEndpoints, "true"]
  CreateS3Resources: !Equals [!Ref CreateS3Bucket, "true"]
  InstallSkill: !Equals [!Ref InstallS3FilesSkill, "true"]
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, "none"]]
  AllowSSH: !And
    - !Not [!Equals [!Ref AllowedSSHCIDR, ""]]
    - !Not [!Equals [!Ref KeyPairName, "none"]]

Rules:
  ExistingVPCRequiresIds:
    RuleCondition: !Equals [!Ref UseExistingVPC, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingVPCId, ""]]
        AssertDescription: "ExistingVPCId is required when UseExistingVPC is true"
      - Assert: !Not [!Equals [!Ref ExistingPublicSubnetId, ""]]
        AssertDescription: "ExistingPublicSubnetId is required when UseExistingVPC is true"
      - Assert: !Not [!Equals [!Ref ExistingPrivateSubnetId, ""]]
        AssertDescription: "ExistingPrivateSubnetId is required when UseExistingVPC is true"

Mappings:
  ArchitectureMap:
    t3.small: { Arch: "amd64" }
    t3.medium: { Arch: "amd64" }
    t3.large: { Arch: "amd64" }
    c5.large: { Arch: "amd64" }
    c5.xlarge: { Arch: "amd64" }
    t4g.small: { Arch: "arm64" }
    t4g.medium: { Arch: "arm64" }
    t4g.large: { Arch: "arm64" }
    c6g.large: { Arch: "arm64" }
    c6g.xlarge: { Arch: "arm64" }
    c7g.large: { Arch: "arm64" }
    c7g.xlarge: { Arch: "arm64" }

  # Ubuntu 24.04 AMI IDs for AWS China regions (updated 2026-02-18)
  RegionAmiMap:
    cn-north-1:
      arm64: "ami-00f3db296e1803e0f"
      amd64: "ami-094440eec8e85a0f9"
    cn-northwest-1:
      arm64: "ami-00e2bf64742a8781e"
      amd64: "ami-07c153df9422b4d5c"

Resources:
  # ==================== Wait Condition ====================
  OpenClawWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  OpenClawWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: OpenClawInstance
    Properties:
      Handle: !Ref OpenClawWaitHandle
      Timeout: '1200'
      Count: 1

  # ==================== S3 Bucket for Files Skill ====================
  OpenClawFilesBucket:
    Type: AWS::S3::Bucket
    Condition: CreateS3Resources
    Properties:
      BucketName: !Sub "${AWS::StackName}-openclaw-files"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldUploads
            Status: Enabled
            Prefix: uploads/
            ExpirationInDays: 7
            NoncurrentVersionExpirationInDays: 1
          - Id: DeleteOldUploadPages
            Status: Enabled
            Prefix: upload-page-
            ExpirationInDays: 1
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-files"
        - Key: Purpose
          Value: "OpenClaw S3 Files Skill"

  # ==================== VPC and Network ====================
  OpenClawVPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  OpenClawInternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVPC

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref OpenClawVPC
      InternetGatewayId: !Ref OpenClawInternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref OpenClawVPC
      CidrBlock: "10.0.1.0/24"
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-subnet"

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref OpenClawVPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-subnet"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref OpenClawVPC

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVPC
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref OpenClawInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # VPC Endpoint Security Group
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateEndpoints
    Properties:
      GroupDescription: "Security group for VPC endpoints"
      VpcId: !If [CreateNewVPC, !Ref OpenClawVPC, !Ref ExistingVPCId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref OpenClawSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpce-sg"

  # SSM VPC Endpoint (for Session Manager)
  SSMVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !If [CreateNewVPC, !Ref OpenClawVPC, !Ref ExistingVPCId]
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !If [CreateNewVPC, !Ref PrivateSubnet, !Ref ExistingPrivateSubnetId]
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SSMMessagesVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !If [CreateNewVPC, !Ref OpenClawVPC, !Ref ExistingVPCId]
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssmmessages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !If [CreateNewVPC, !Ref PrivateSubnet, !Ref ExistingPrivateSubnetId]
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  EC2MessagesVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !If [CreateNewVPC, !Ref OpenClawVPC, !Ref ExistingVPCId]
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ec2messages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !If [CreateNewVPC, !Ref PrivateSubnet, !Ref ExistingPrivateSubnetId]
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  # ==================== IAM Role ====================
  OpenClawInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com.cn
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Sub 'arn:aws-cn:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - !Sub 'arn:aws-cn:iam::aws:policy/CloudWatchAgentServerPolicy'
      Policies:
        - PolicyName: SSMParameterPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:PutParameter'
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws-cn:ssm:${AWS::Region}:${AWS::AccountId}:parameter/openclaw/${AWS::StackName}/*'
        - !If
          - CreateS3Resources
          - PolicyName: S3FilesSkillPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - 's3:PutObject'
                    - 's3:GetObject'
                    - 's3:DeleteObject'
                  Resource: !Sub '${OpenClawFilesBucket.Arn}/*'
                - Effect: Allow
                  Action:
                    - 's3:ListBucket'
                  Resource: !GetAtt OpenClawFilesBucket.Arn
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-instance-role"

  OpenClawInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref OpenClawInstanceRole

  # ==================== Security Group ====================
  OpenClawSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "OpenClaw instance security group"
      VpcId: !If [CreateNewVPC, !Ref OpenClawVPC, !Ref ExistingVPCId]
      SecurityGroupIngress:
        - !If
          - AllowSSH
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSSHCIDR
            Description: "SSH access (fallback)"
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # ==================== EC2 Instance ====================
  OpenClawInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap
        - RegionAmiMap
        - !Ref 'AWS::Region'
        - !FindInMap [ArchitectureMap, !Ref InstanceType, Arch]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref OpenClawInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref OpenClawSecurityGroup
          SubnetId: !If [CreateNewVPC, !Ref PublicSubnet, !Ref ExistingPublicSubnetId]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: !Ref VolumeType
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > >(tee /var/log/openclaw-setup.log)
          exec 2>&1

          echo "=========================================="
          echo "OpenClaw AWS China Setup: $(date)"
          echo "Region: ${AWS::Region}"
          echo "LLM Provider: ${LLMApiBaseUrl}"
          echo "Model: ${LLMModel}"
          echo "=========================================="

          export DEBIAN_FRONTEND=noninteractive

          # System update
          echo "[1/9] Updating system..."
          apt-get update
          apt-get upgrade -y
          apt-get install -y unzip curl git

          # Detect region and instance ID (IMDSv2)
          echo "[*] Detecting instance metadata..."
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null || echo "")
          if [ -n "$IMDS_TOKEN" ]; then
            AWS_REGION=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null || echo "")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo "")
          else
            AWS_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null || echo "")
            INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo "")
          fi
          AWS_REGION=${!AWS_REGION:-"${AWS::Region}"}
          INSTANCE_ID=${!INSTANCE_ID:-"unknown"}
          echo "Region: $AWS_REGION | Instance: $INSTANCE_ID"

          # Install AWS CLI v2
          echo "[2/9] Installing AWS CLI..."
          curl "https://awscli.amazonaws.com/awscli-exe-linux-$(arch).zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install
          rm -rf aws awscliv2.zip

          # Install SSM Agent
          echo "[3/9] Configuring SSM Agent..."
          snap start amazon-ssm-agent || systemctl start amazon-ssm-agent

          # Install Docker
          echo "[4/9] Installing Docker..."
          # Use Alibaba Cloud mirror for faster Docker install in China
          curl -fsSL https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg 2>/dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://mirrors.aliyun.com/docker-ce/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io || {
            echo "Alibaba mirror failed, falling back to official install..."
            curl -fsSL https://get.docker.com | sh
          }
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ubuntu

          # Configure Docker mirror for China
          mkdir -p /etc/docker
          cat > /etc/docker/daemon.json << 'DOCKEREOF'
          {
            "registry-mirrors": [
              "https://docker.1ms.run"
            ]
          }
          DOCKEREOF
          systemctl restart docker

          # Install Node.js
          echo "[5/9] Installing Node.js..."
          sudo -u ubuntu bash << 'UBUNTU_SCRIPT'
          cd ~

          # Use npmmirror for NVM install (faster in China)
          export NVM_SOURCE=https://gitee.com/mirrors/nvm.git
          for i in {1..3}; do
            if curl -o- https://gitee.com/mirrors/nvm/raw/v0.40.1/install.sh | bash; then
              break
            fi
            echo "NVM installation via gitee failed, retrying $i/3..."
            sleep 5
            # Fallback to GitHub on last try
            if [ "$i" -eq "3" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash || echo "NVM install failed"
            fi
          done

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          # Use npmmirror for faster Node.js download in China
          export NVM_NODEJS_ORG_MIRROR=https://npmmirror.com/mirrors/node

          # Install Node.js 22
          nvm install 22
          nvm use 22
          nvm alias default 22

          # Use Chinese npm mirror
          npm config set registry https://registry.npmmirror.com

          # Install OpenClaw
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            echo "ARM64 detected, installing with --ignore-scripts..."
            npm install -g openclaw@latest --timeout=300000 --ignore-scripts || {
              echo "OpenClaw installation failed on arm64, retrying..."
              npm cache clean --force
              npm install -g openclaw@latest --timeout=300000 --ignore-scripts
            }
          else
            npm install -g openclaw@latest --timeout=300000 || {
              echo "OpenClaw installation failed, retrying..."
              npm cache clean --force
              npm install -g openclaw@latest --timeout=300000
            }
          fi

          if ! grep -q 'NVM_DIR' ~/.bashrc; then
              echo 'export NVM_DIR="$HOME/.nvm"' >> ~/.bashrc
              echo '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"' >> ~/.bashrc
          fi
          UBUNTU_SCRIPT

          # Create wrapper script so openclaw works system-wide
          OPENCLAW_MJS=$(find /home/ubuntu/.nvm -path "*/node_modules/openclaw/openclaw.mjs" 2>/dev/null | head -1)
          NODE_BIN=$(find /home/ubuntu/.nvm -name node -type f 2>/dev/null | head -1)
          if [ -z "$OPENCLAW_MJS" ] || [ -z "$NODE_BIN" ]; then
            echo "FATAL: openclaw or node not found - npm install likely failed"
            exit 1
          fi
          echo "#!/bin/bash" > /usr/local/bin/openclaw
          echo "exec $NODE_BIN $OPENCLAW_MJS \"\$@\"" >> /usr/local/bin/openclaw
          chmod +x /usr/local/bin/openclaw
          echo "openclaw wrapper created: node=$NODE_BIN mjs=$OPENCLAW_MJS"

          # Verify openclaw works
          if ! /usr/local/bin/openclaw --version 2>/dev/null; then
            echo "FATAL: openclaw wrapper cannot execute - check node path"
            exit 1
          fi
          echo "openclaw verified OK: $(/usr/local/bin/openclaw --version)"

          # Configure AWS region
          echo "[6/9] Configuring AWS..."
          sudo -u ubuntu mkdir -p /home/ubuntu/.aws
          sudo -u ubuntu bash -c "printf '[default]\nregion = %s\noutput = json\n' \"$AWS_REGION\" > /home/ubuntu/.aws/config"
          chown -R ubuntu:ubuntu /home/ubuntu/.aws
          chmod 600 /home/ubuntu/.aws/config

          # Configure environment variables
          echo "[7/9] Configuring environment variables..."
          {
            echo "export AWS_REGION=$AWS_REGION"
            echo "export AWS_DEFAULT_REGION=$AWS_REGION"
            echo "export AWS_PROFILE=default"
            echo "export OPENCLAW_MODEL=${LLMModel}"
            echo "export OPENCLAW_LLM_PROVIDER=openai-compatible"
          } >> /home/ubuntu/.bashrc

          # Create systemd environment file
          sudo -u ubuntu mkdir -p /home/ubuntu/.config/environment.d
          sudo -u ubuntu bash -c "{ echo AWS_REGION=$AWS_REGION; echo AWS_DEFAULT_REGION=$AWS_REGION; } > /home/ubuntu/.config/environment.d/aws.conf"

          # Enable systemd linger
          loginctl enable-linger ubuntu
          systemctl start user@1000.service

          # Configure OpenClaw
          echo "[8/9] Configuring OpenClaw with SiliconFlow/OpenAI-compatible provider..."

          sudo -u ubuntu mkdir -p /home/ubuntu/.openclaw

          # Generate Gateway Token
          GATEWAY_TOKEN=$(openssl rand -hex 24)

          # Create OpenAI-compatible provider configuration
          sudo -u ubuntu tee /home/ubuntu/.openclaw/openclaw.json > /dev/null << 'JSONEOF'
          {
            "gateway": {
              "mode": "local",
              "port": 18789,
              "bind": "loopback",
              "controlUi": {
                "enabled": true,
                "allowInsecureAuth": true
              },
              "auth": {
                "mode": "token",
                "token": "GATEWAY_TOKEN_PLACEHOLDER"
              }
            },
            "models": {
              "providers": {
                "maas": {
                  "baseUrl": "API_BASE_URL_PLACEHOLDER",
                  "api": "openai-completions",
                  "auth": "api-key",
                  "apiKey": "API_KEY_PLACEHOLDER",
                  "models": [
                    {
                      "id": "MODEL_ID_PLACEHOLDER",
                      "name": "MaaS Model",
                      "input": ["text"],
                      "contextWindow": 65536,
                      "maxTokens": 8192
                    }
                  ]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "maas/MODEL_ID_PLACEHOLDER"
                }
              }
            }
          }
          JSONEOF

          # Replace placeholders with actual values
          sed -i "s/GATEWAY_TOKEN_PLACEHOLDER/$GATEWAY_TOKEN/g" /home/ubuntu/.openclaw/openclaw.json
          sed -i "s|API_BASE_URL_PLACEHOLDER|${LLMApiBaseUrl}|g" /home/ubuntu/.openclaw/openclaw.json
          sed -i "s|API_KEY_PLACEHOLDER|${LLMApiKey}|g" /home/ubuntu/.openclaw/openclaw.json
          sed -i "s|MODEL_ID_PLACEHOLDER|${LLMModel}|g" /home/ubuntu/.openclaw/openclaw.json

          # Install and start gateway
          for i in $(seq 1 15); do
            if [ -S /run/user/1000/bus ]; then
              echo "User systemd session ready"
              break
            fi
            echo "Waiting for user session... $i/15"
            sleep 2
          done

          sudo -H -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus bash -c '
          export HOME=/home/ubuntu
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          openclaw gateway install || echo "Gateway install failed"
          systemctl --user start openclaw-gateway.service || openclaw gateway || echo "Gateway start failed"
          '

          # Wait for daemon to be ready
          echo "Waiting for OpenClaw daemon to start..."
          for i in $(seq 1 30); do
            if ss -tlnp 2>/dev/null | grep -q ':18789'; then
              echo "OpenClaw daemon is up on port 18789"
              break
            fi
            echo "Attempt $i/30: port 18789 not ready yet, waiting..."
            sleep 2
          done

          if ! ss -tlnp 2>/dev/null | grep -q ':18789'; then
            echo "WARNING: OpenClaw gateway did not start within 60s, trying fallback..."
            sudo -H -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 bash -c '
            export HOME=/home/ubuntu
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            systemctl --user restart openclaw-gateway.service || openclaw gateway &
            '
            sleep 5
          fi

          # Enable messaging channels
          echo "[8.5/9] Enabling messaging channels..."
          sudo -H -u ubuntu bash -c '
          export HOME=/home/ubuntu
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          openclaw plugins enable whatsapp || echo "WhatsApp plugin enable failed"
          openclaw plugins enable telegram || echo "Telegram plugin enable failed"
          openclaw plugins enable discord || echo "Discord plugin enable failed"
          openclaw plugins enable slack || echo "Slack plugin enable failed"
          '

          # Save token locally
          echo "$GATEWAY_TOKEN" > /home/ubuntu/.openclaw/gateway_token.txt
          chown ubuntu:ubuntu /home/ubuntu/.openclaw/gateway_token.txt

          # Save to SSM Parameter Store
          STACK_NAME="${AWS::StackName}"
          aws ssm put-parameter \
            --name "/openclaw/$STACK_NAME/gateway-token" \
            --value "$GATEWAY_TOKEN" \
            --type "SecureString" \
            --region $AWS_REGION \
            --overwrite || echo "Failed to save token to SSM"

          # Save LLM API key to SSM Parameter Store (secure)
          aws ssm put-parameter \
            --name "/openclaw/$STACK_NAME/llm-api-key" \
            --value "${LLMApiKey}" \
            --type "SecureString" \
            --region $AWS_REGION \
            --overwrite || echo "Failed to save LLM API key to SSM"

          # Save instance info
          echo "$INSTANCE_ID" > /home/ubuntu/.openclaw/instance_id.txt
          echo "$AWS_REGION" > /home/ubuntu/.openclaw/region.txt

          # Create access instructions
          echo "OpenClaw Access Instructions" > /home/ubuntu/ACCESS_INSTRUCTIONS.txt
          echo "Run on LOCAL: aws ssm start-session --target $INSTANCE_ID --region $AWS_REGION --document-name AWS-StartPortForwardingSession --parameters '{\"portNumber\":[\"18789\"],\"localPortNumber\":[\"18789\"]}'" >> /home/ubuntu/ACCESS_INSTRUCTIONS.txt
          echo "Then open: http://localhost:18789/?token=$GATEWAY_TOKEN" >> /home/ubuntu/ACCESS_INSTRUCTIONS.txt
          chown ubuntu:ubuntu /home/ubuntu/ACCESS_INSTRUCTIONS.txt

          # Create SSM access script
          cat > /home/ubuntu/ssm-portforward.sh << 'EOF'
          #!/bin/bash
          INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          TOKEN=$(cat /home/ubuntu/.openclaw/gateway_token.txt)

          echo "=========================================="
          echo "OpenClaw SSM Port Forwarding"
          echo "=========================================="
          echo ""
          echo "Run on your local computer:"
          echo ""
          echo "aws ssm start-session \\"
          echo "  --target $INSTANCE_ID \\"
          echo "  --region $REGION \\"
          echo "  --document-name AWS-StartPortForwardingSession \\"
          echo "  --parameters '{\"portNumber\":[\"18789\"],\"localPortNumber\":[\"18789\"]}'"
          echo ""
          echo "Then open in browser:"
          echo "http://localhost:18789/?token=$TOKEN"
          echo ""
          echo "=========================================="
          EOF
          chmod +x /home/ubuntu/ssm-portforward.sh
          chown ubuntu:ubuntu /home/ubuntu/ssm-portforward.sh

          # Signal CloudFormation
          echo "[9/9] Signaling CloudFormation..."
          echo "SUCCESS" > /home/ubuntu/.openclaw/setup_status.txt
          echo "Setup completed: $(date)" >> /home/ubuntu/.openclaw/setup_status.txt

          apt-get install -y python3-pip 2>&1 | tee -a /var/log/openclaw-setup.log
          pip3 install --break-system-packages https://s3.cn-north-1.amazonaws.com.cn/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz 2>&1 | tee -a /var/log/openclaw-setup.log || {
            echo "China cfn-bootstrap failed, trying global..."
            pip3 install --break-system-packages https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz 2>&1 | tee -a /var/log/openclaw-setup.log || echo "cfn-bootstrap install failed, will use curl fallback"
          }

          CFN_SIGNAL=$(which cfn-signal 2>/dev/null || find /usr -name cfn-signal 2>/dev/null | head -1)
          COMPLETE_URL="http://localhost:18789/?token=$GATEWAY_TOKEN"

          if [ -n "$CFN_SIGNAL" ]; then
            echo "Using cfn-signal: $CFN_SIGNAL"
            $CFN_SIGNAL -e 0 -d "$COMPLETE_URL" -r "OpenClaw ready" '${OpenClawWaitHandle}'
          else
            echo "cfn-signal not found, using curl"
            SIGNAL_JSON="{\"Status\":\"SUCCESS\",\"Reason\":\"OpenClaw ready\",\"UniqueId\":\"openclaw\",\"Data\":\"$COMPLETE_URL\"}"
            curl -X PUT -H "Content-Type:" --data-binary "$SIGNAL_JSON" "${OpenClawWaitHandle}"
          fi

          echo "Signal sent successfully"

          # Install S3 Files Skill (conditional)
          if [ "${InstallS3FilesSkill}" = "true" ]; then
            echo "[*] Installing S3 Files Skill..."
            echo "Waiting for OpenClaw workspace directory to be created..."

            WORKSPACE_READY=false
            for i in $(seq 1 300); do
              if [ -d /home/ubuntu/.openclaw/workspace ]; then
                echo "Workspace ready after $i seconds"
                WORKSPACE_READY=true
                break
              fi
              if [ $((i % 30)) -eq 0 ]; then
                echo "  Still waiting for workspace... ($i/300 seconds)"
              fi
              sleep 1
            done

            if [ "$WORKSPACE_READY" = "false" ]; then
              echo "Workspace not created after 5 minutes, creating manually..."
              sudo -u ubuntu mkdir -p /home/ubuntu/.openclaw/workspace
            fi

            sudo -u ubuntu bash << 'S3_SKILL_SCRIPT'
            export HOME=/home/ubuntu
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            mkdir -p /home/ubuntu/.openclaw/workspace/skills
            cd /home/ubuntu/.openclaw/workspace/skills

            echo "Cloning S3 Files Skill from repository..."
            git clone --depth 1 --no-checkout https://github.com/aws-samples/sample-OpenClaw-on-AWS-with-Bedrock.git temp-repo 2>&1
            cd temp-repo
            git sparse-checkout set skills/s3-files-skill/skills/s3-files 2>&1
            git checkout 2>&1

            mv skills/s3-files-skill/skills/s3-files ../s3-files
            cd ..
            rm -rf temp-repo

            cd s3-files
            echo "Installing skill dependencies..."
            npm install 2>&1

            if [ "${CreateS3Bucket}" = "true" ]; then
              echo "Configuring skill with CloudFormation-created bucket..."
              cat > config.json <<EOF
          {
            "bucketName": "${AWS::StackName}-openclaw-files",
            "region": "${AWS::Region}",
            "defaultExpirationHours": 24,
            "maxUploadSizeMB": 100
          }
          EOF
              echo "S3 Files Skill configured with bucket: ${AWS::StackName}-openclaw-files"
            else
              cp config.example.json config.json
              echo "WARNING: S3 Files Skill installed but NOT configured!"
            fi

            echo "S3 Files Skill installation complete"
          S3_SKILL_SCRIPT
            echo "S3 Files Skill installed successfully"
          else
            echo "Skipping S3 Files Skill installation"
          fi

          echo "=========================================="
          echo "OpenClaw China installation complete!"
          echo "LLM Provider: ${LLMApiBaseUrl}"
          echo "Model: ${LLMModel}"
          echo "Token: $GATEWAY_TOKEN"
          echo "=========================================="
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-instance"

Outputs:
  Step1InstallSSMPlugin:
    Description: "STEP 1: Install SSM Session Manager Plugin on your local computer"
    Value: "https://docs.amazonaws.cn/systems-manager/latest/userguide/session-manager-working-with-install-plugin.html"

  Step2PortForwarding:
    Description: "STEP 2: Run this command on LOCAL computer (keep terminal open)"
    Value: !Sub |
      aws ssm start-session --target ${OpenClawInstance} --region ${AWS::Region} --document-name AWS-StartPortForwardingSession --parameters '{"portNumber":["18789"],"localPortNumber":["18789"]}'

  Step3AccessURL:
    Description: "STEP 3: Open this URL in browser"
    Value: !Select
      - 1
      - !Split
        - '":"'
        - !Select
          - 0
          - !Split
            - '"}'
            - !GetAtt OpenClawWaitCondition.Data

  Step4StartChatting:
    Description: "STEP 4: Start using OpenClaw!"
    Value: "Connect WhatsApp, Telegram, Discord, Slack. See README: https://github.com/aws-samples/sample-OpenClaw-on-AWS-with-Bedrock"

  InstanceId:
    Description: "EC2 Instance ID"
    Value: !Ref OpenClawInstance

  LLMProviderInfo:
    Description: "LLM provider and model in use"
    Value: !Sub "Provider: ${LLMApiBaseUrl} | Model: ${LLMModel}"

  MonthlyCost:
    Description: "Estimated monthly cost (CNY)"
    Value: !Sub
      - |
        EC2 (${InstanceType}): ~150-300 CNY (Graviton instances 20% cheaper)
        EBS (${VolumeSize}GB ${VolumeType}): ~18 CNY (at 30GB gp3 baseline)
        VPC Endpoints: ${EndpointCost}
        LLM API: Pay-per-use (varies by provider and model)
        Total Infrastructure: ~${TotalCost}/month + LLM costs
      - EndpointCost: !If [CreateEndpoints, "~150 CNY ($0.01/hour x 3 endpoints)", "0 CNY"]
        TotalCost: !If [CreateEndpoints, "320-470 CNY", "170-320 CNY"]

  InstanceArchitecture:
    Description: "Instance architecture"
    Value: !FindInMap [ArchitectureMap, !Ref InstanceType, Arch]

  S3BucketName:
    Condition: CreateS3Resources
    Description: "S3 bucket for S3 Files Skill"
    Value: !Ref OpenClawFilesBucket
    Export:
      Name: !Sub "${AWS::StackName}-S3FilesBucket"

  S3BucketArn:
    Condition: CreateS3Resources
    Description: "ARN of S3 Files bucket"
    Value: !GetAtt OpenClawFilesBucket.Arn

  S3FilesSkillInstalled:
    Description: "S3 Files Skill installation status"
    Value: !If [InstallSkill, "Installed and configured", "Not installed (set InstallS3FilesSkill=true to enable)"]
